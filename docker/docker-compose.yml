services:
  # ==========================================================================
  # PostgreSQL Datenbank
  # ==========================================================================
  db:
    image: postgres:16-alpine
    container_name: pishield-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pishield
      POSTGRES_USER: pishield
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pishield"]
      interval: 10s
      timeout: 5s
      retries: 5
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, FOWNER, DAC_READ_SEARCH]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend-network
      - scraper-network

  # ==========================================================================
  # Hauptsystem (Orchestrator)
  # ==========================================================================
  orchestrator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.orchestrator
    container_name: pishield-orchestrator
    env_file:
      - ../.env
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      # Datenbank (über PISHIELD_DB_* Prefix)
      - PISHIELD_DB_TYPE=postgresql
      - PISHIELD_DB_HOST=db
      - PISHIELD_DB_PORT=5432
      - PISHIELD_DB_NAME=pishield
      - PISHIELD_DB_USER=pishield
      - PISHIELD_DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set}
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      # API Keys kommen aus env_file (../.env)
    volumes:
      # Config wird NICHT gemountet - nutzt nur Umgebungsvariablen
      - ../data:/app/data:ro
      - logs:/app/logs
    ports:
      - "8000:8000"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend-network

  # ==========================================================================
  # Scraper Sandbox Pool (Template für Scaling)
  # ==========================================================================
  scraper:
    build:
      context: ..
      dockerfile: docker/Dockerfile.scraper
    env_file:
      - ../.env
    # Wird über docker-compose scale gesteuert
    deploy:
      replicas: 4  # Scaled up for parallel scanning, max 10
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      # Datenbank (über PISHIELD_DB_* Prefix)
      - PISHIELD_DB_TYPE=postgresql
      - PISHIELD_DB_HOST=db
      - PISHIELD_DB_PORT=5432
      - PISHIELD_DB_NAME=pishield
      - PISHIELD_DB_USER=pishield
      - PISHIELD_DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set}
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      # API Keys kommen aus env_file (../.env)
    # Kein Zugriff auf Host-Filesystem (Isolation)
    read_only: true
    tmpfs:
      - /tmp:size=100M,noexec,nosuid
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - scraper-network

  # ==========================================================================
  # Redis (für Job Queue)
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: pishield-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    cap_drop: [ALL]
    cap_add: [SETUID, SETGID]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend-network
      - scraper-network

volumes:
  postgres_data:
  redis_data:
  logs:

networks:
  backend-network:
    driver: bridge
  scraper-network:
    driver: bridge
